name: weclaws

services:
  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    environment:
      TOKEN: ${BROWSERLESS_TOKEN}
      CONCURRENT: ${BROWSERLESS_CONCURRENT:-2}
      QUEUED: ${BROWSERLESS_QUEUED:-2}
      TIMEOUT: ${BROWSERLESS_TIMEOUT:-120000}

  sandbox-runtime:
    build:
      context: ../..
      dockerfile: infra/docker/sandbox-runtime.Dockerfile
      args:
        SANDBOX_RUNTIME_NPM_VERSION: ${SANDBOX_RUNTIME_NPM_VERSION:-}
        AGENT_BROWSER_NPM_VERSION: ${AGENT_BROWSER_NPM_VERSION:-0.27.0}
        BUN_VERSION: ${BUN_VERSION:-1.3.13}
        LARK_CLI_NPM_VERSION: ${LARK_CLI_NPM_VERSION:-1.0.32}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.4}
        UV_VERSION: ${UV_VERSION:-0.11.7}
    restart: unless-stopped
    ports:
      - "${SANDBOX_RUNTIME_PORT:-8788}:${SANDBOX_RUNTIME_PORT:-8788}"
    environment:
      BROWSERLESS_API_KEY: ${BROWSERLESS_TOKEN}
      BROWSERLESS_API_URL: ${BROWSERLESS_API_URL:-http://browserless:3000}
      NODE_ENV: production
      LOG_LEVEL: ${SANDBOX_RUNTIME_LOG_LEVEL:-info}
      SRT_POOL_CONFIG_FILE: /app/storage/sandbox-runtime-private/srt-pools.json
      SRT_POOL_STATUS_FILE: /app/storage/sandbox-runtime-private/srt-pool-status.json
      SRT_MANAGER_PORT: ${SANDBOX_RUNTIME_PORT:-8788}
    volumes:
      - sandbox_user_workspaces:/app/apps/sandbox-runtime/user-workspaces
      - claws_instances:/app/storage/instances
      - sandbox_runtime_private:/app/storage/sandbox-runtime-private
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    cgroup: private
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:' + process.env.SRT_MANAGER_PORT + '/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  supervisor:
    build:
      context: ../..
      dockerfile: infra/docker/supervisor.Dockerfile
    restart: unless-stopped
    depends_on:
      sandbox-runtime:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/storage/sqlite/db.sqlite
      FASTAGENT_SANDBOX_MODE: ${FASTAGENT_SANDBOX_MODE:-remote}
      INSTANCES_ROOT: /app/storage/instances
      RECONCILE_INTERVAL_MS: ${RECONCILE_INTERVAL_MS:-2000}
      SRT_SERVICE_HOST: sandbox-runtime
      SRT_POOL_CONFIG_FILE: /app/storage/sandbox-runtime-private/srt-pools.json
      SRT_POOL_STATUS_FILE: /app/storage/sandbox-runtime-private/srt-pool-status.json
      SRT_WORKSPACE_MAP_DIR: /app/storage/sandbox-runtime-private/workspace-map
      SRT_DEFAULT_POOL_SIZE: ${SRT_DEFAULT_POOL_SIZE:-3}
      SRT_DEFAULT_MIN_READY_PROCESSES: ${SRT_DEFAULT_MIN_READY_PROCESSES:-1}
      SRT_DEFAULT_SESSION_TIMEOUT_MS: ${SRT_DEFAULT_SESSION_TIMEOUT_MS:-600000}
      SRT_DEFAULT_MAX_CONCURRENT_INIT: ${SRT_DEFAULT_MAX_CONCURRENT_INIT:-1}
      SRT_DEFAULT_HEALTH_CHECK_INTERVAL_MS: ${SRT_DEFAULT_HEALTH_CHECK_INTERVAL_MS:-60000}
      SRT_DEFAULT_PORT_RANGE_WIDTH: ${SRT_DEFAULT_PORT_RANGE_WIDTH:-100}
      SRT_PORT_BASE: ${SRT_PORT_BASE:-31000}
      SRT_PROXY_PORT_BASE: ${SRT_PROXY_PORT_BASE:-9100}
      SRT_WORKSPACE_BASE_ROOT: ${SRT_WORKSPACE_BASE_ROOT:-/app/apps/sandbox-runtime/user-workspaces}
      SRT_DEFAULT_DENIED_DOMAINS: ${SRT_DEFAULT_DENIED_DOMAINS:-}
      SRT_DEFAULT_ALLOW_READ: ${SRT_DEFAULT_ALLOW_READ:-}
      SRT_DEFAULT_ALLOW_WRITE: ${SRT_DEFAULT_ALLOW_WRITE:-/tmp}
      SRT_DEFAULT_DENY_READ: ${SRT_DEFAULT_DENY_READ:-/etc/passwd,/etc/passwd-,/etc/shadow,/etc/shadow-,/etc/group,/etc/group-,/etc/gshadow,/etc/gshadow-,/etc/mtab,/proc/self/mountinfo,/proc/*/mountinfo,/proc/self/mounts,/proc/*/mounts,/proc/mounts,/proc/self/mountstats,/proc/*/mountstats,/proc/self/cmdline,/proc/1/cmdline,/proc/*/cmdline,/proc/self/environ,/proc/1/environ,/proc/*/environ,/proc/kallsyms,/proc/self/cgroup,/proc/*/cgroup,/proc/cgroups,/root,~/.ssh,~/.aws}
      SRT_DEFAULT_DENY_WRITE: ${SRT_DEFAULT_DENY_WRITE:-.env,~/.ssh,~/.aws}
    volumes:
      - claws_sqlite:/app/storage/sqlite
      - claws_instances:/app/storage/instances
      - sandbox_runtime_private:/app/storage/sandbox-runtime-private

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      sandbox-runtime:
        condition: service_healthy
      supervisor:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/app/storage/sqlite/db.sqlite
      APP_BASE_URL: ${APP_BASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      WEB_ADMIN_EMAILS: ${WEB_ADMIN_EMAILS:-}
      WEB_USER_BOT_LIMIT: ${WEB_USER_BOT_LIMIT:-0}
      SRT_POOL_STATUS_FILE: /app/storage/sandbox-runtime-private/srt-pool-status.json
      SRT_DEFAULT_POOL_SIZE: ${SRT_DEFAULT_POOL_SIZE:-3}
      SRT_DEFAULT_MIN_READY_PROCESSES: ${SRT_DEFAULT_MIN_READY_PROCESSES:-1}
      SRT_DEFAULT_SESSION_TIMEOUT_MS: ${SRT_DEFAULT_SESSION_TIMEOUT_MS:-600000}
      SRT_DEFAULT_MAX_CONCURRENT_INIT: ${SRT_DEFAULT_MAX_CONCURRENT_INIT:-1}
      SRT_DEFAULT_HEALTH_CHECK_INTERVAL_MS: ${SRT_DEFAULT_HEALTH_CHECK_INTERVAL_MS:-60000}
      SRT_DEFAULT_PORT_RANGE_WIDTH: ${SRT_DEFAULT_PORT_RANGE_WIDTH:-100}
      SRT_PORT_BASE: ${SRT_PORT_BASE:-31000}
      SRT_PROXY_PORT_BASE: ${SRT_PROXY_PORT_BASE:-9100}
      SRT_WORKSPACE_BASE_ROOT: ${SRT_WORKSPACE_BASE_ROOT:-/app/apps/sandbox-runtime/user-workspaces}
      SRT_DEFAULT_DENIED_DOMAINS: ${SRT_DEFAULT_DENIED_DOMAINS:-}
      SRT_DEFAULT_ALLOW_READ: ${SRT_DEFAULT_ALLOW_READ:-}
      SRT_DEFAULT_ALLOW_WRITE: ${SRT_DEFAULT_ALLOW_WRITE:-/tmp}
      SRT_DEFAULT_DENY_READ: ${SRT_DEFAULT_DENY_READ:-/etc/passwd,/etc/passwd-,/etc/shadow,/etc/shadow-,/etc/group,/etc/group-,/etc/gshadow,/etc/gshadow-,/etc/mtab,/proc/self/mountinfo,/proc/*/mountinfo,/proc/self/mounts,/proc/*/mounts,/proc/mounts,/proc/self/mountstats,/proc/*/mountstats,/proc/self/cmdline,/proc/1/cmdline,/proc/*/cmdline,/proc/self/environ,/proc/1/environ,/proc/*/environ,/proc/kallsyms,/proc/self/cgroup,/proc/*/cgroup,/proc/cgroups,/root,~/.ssh,~/.aws}
      SRT_DEFAULT_DENY_WRITE: ${SRT_DEFAULT_DENY_WRITE:-.env,~/.ssh,~/.aws}
    volumes:
      - claws_sqlite:/app/storage/sqlite
      - claws_instances:/app/storage/instances
      - sandbox_runtime_private:/app/storage/sandbox-runtime-private
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/login', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  claws_sqlite:
  claws_instances:
  sandbox_user_workspaces:
  sandbox_runtime_private:
